<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>please forgive me 🥺</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hearts" aria-hidden="true"></div>

  <main class="card">
    <p class="emoji">🥺💙</p>
    <h1>I'm sorry...</h1>
    <p class="msg">
      I messed up. You didn't deserve that.<br>
      Can you forgive me?
    </p>

    <div class="btns" id="btns">
      <button class="yes" type="button" id="yes">Yes! 💕</button>
      <button class="no" type="button" id="no">hm...</button>
    </div>

    <div class="done hidden" id="done">
      <p class="big">yay!! 🫂</p>
      <p>thank you. i really like you, do you know, i wonder ?.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
